---
- name: Ensure log volume filesystem exists
  filesystem:
    fstype: ext4
    dev: "{{ loghost_disk.name }}"

- name: Create mount point
  file:
    path: /logs
    state: directory
    mode: "0755"

- name: Mount log volume
  mount:
    path: /logs
    src: "{{ loghost_disk.name }}"
    fstype: ext4
    opts: defaults
    state: mounted

- name: Create Loki directories
  file:
    path: "{{ item }}"
    state: directory
    owner: 10001
    group: 10001
    mode: "0775"
  loop:
    - /logs/loki
    - /logs/loki/chunks
    - /logs/loki/rules
    - /logs/loki/compactor
    - /logs/loki/wal
    - /logs/loki/tsdb-shipper-active
    - /logs/loki/tsdb-shipper-cache

# Prepare startup of prosEO Monitor and Grafana
  
- name: Create prosEO and Grafana directories
  file:
    path: "/opt/prosEO/log/{{ item }}"
    state: directory
    mode: '0775'
  loop:
    - monitor
    - grafana
    - grafana/dashboards
    - grafana/provisioning
    - grafana/provisioning/datasources
    - grafana/provisioning/dashboards

- name: Copy Grafana datasource config
  template:
    src: datasource.yaml
    dest: /opt/prosEO/log/grafana/provisioning/datasources/datasource.yaml

- name: Copy Grafana dashboard config
  copy:
    src: dashboards.yaml
    dest: /opt/prosEO/log/grafana/provisioning/dashboards/
    
- name: Copy Grafana dashboards
  copy:
    src: dashboards/
    dest: /opt/prosEO/log/grafana/dashboards/

- name: Create base Loki directory
  file:
    path: /opt/prosEO/loki
    state: directory
    owner: 10001
    group: 10001
    mode: '0775'

- name: Create Loki data symlink
  file:
    src: /logs/loki
    dest: /opt/prosEO/loki/data
    state: link

- name: Copy Docker compose file for prosEO Monitor and Grafana (with Loki)
  copy:
    src: docker-compose.yml
    dest: /opt/prosEO
    mode: 0644

- name: Copy Loki config
  copy:
    src: loki-config.yaml
    dest: /opt/prosEO/loki
    mode: 0644

- name: Configure Loki datasource in Grafana
  copy:
    dest: /opt/prosEO/log/grafana/provisioning/datasources/loki.yml
    mode: '0644'
    content: |
      apiVersion: 1

      datasources:
        - name: Loki
          uid: loki-main
          type: loki
          access: proxy
          url: http://loki:3100
          isDefault: false
          editable: true
        
- name: Install prosEO scripts
  copy:
    src: "{{ item }}"
    dest: /opt/prosEO/
    mode: 0755
  loop:
  - alerting.sh
  - run_containers.sh
  - stop_containers.sh

- name: Install cron (cronie)
  dnf:
    name: cronie
    state: present

- name: Enable and start cron service
  systemd:
    name: crond
    enabled: true
    state: started
  
- name: Install required packages
  dnf:
    name:
      - rsync
      - vi
      - jq
      - s-nail
    state: present
    
- name: Configure s-nail
  copy:
    dest: /etc/s-nail.rc
    content: |
      set mta=smtp://{{ groups['bastion_control'][1] }}:25
      set smtp-auth=none
      set from=noreply@alerting.proseo-dlr.de

- name: Run prosEO alerting script every 30 minutes
  cron:
    name: "prosEO alerting"
    job: "/bin/bash /opt/prosEO/alerting.sh >> /var/log/proseo-alert.log 2>&1"
    minute: "*/30"